# Railway configuration for the backend service
# Docs: https://docs.railway.com/config-as-code/reference
#
# Placement:  apps/backend/railway.toml
# Railway → Service Settings:
#   Root Directory:   /apps/backend
#   Config File Path: /apps/backend/railway.toml
 
[build]
builder      = "RAILPACK"
buildCommand = "poetry install --no-root --only main"
 
# Only rebuild when backend files change (monorepo best practice)
watchPatterns = ["apps/backend/**"]
 
[deploy]
startCommand            = "poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"
healthcheckPath         = "/health"
healthcheckTimeout      = 120
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
 
# ── PR / preview environment overrides ────────────────────────────────────────
[environments.pr.deploy]
startCommand = "poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"
